name: Build APK Builder Template Plugin from Runtime Kit

on:
  repository_dispatch:
    types:
      - autojs6_runtime_kit_released
  workflow_dispatch:
    inputs:
      tag:
        description: AutoJs6 release tag, for example v6.8.0
        required: true
      source_repo:
        description: AutoJs6 source repository
        required: false
        default: SuperMonster003/AutoJs6

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Resolve build inputs
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "tag=${{ github.event.client_payload.tag }}" >> "$GITHUB_OUTPUT"
            echo "source_repo=${{ github.event.client_payload.source_repo }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "source_repo=${{ inputs.source_repo }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Runtime Kit
        env:
          GH_TOKEN: ${{ secrets.AUTOJS6_MAIN_REPO_TOKEN || github.token }}
        run: |
          rm -rf runtime-kit
          mkdir -p runtime-kit
          gh release download "${{ steps.vars.outputs.tag }}" \
            --repo "${{ steps.vars.outputs.source_repo }}" \
            --pattern "autojs6-runtime-kit-*.zip" \
            --dir runtime-kit
          unzip runtime-kit/autojs6-runtime-kit-*.zip -d runtime-kit

      - name: Verify Runtime Kit
        run: python3 scripts/verify_runtime_kit.py runtime-kit

      - name: Sync plugin version
        run: python3 scripts/sync_version_from_runtime_kit.py runtime-kit

      - name: Prepare release signing keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          SIGNING_KEY_STORE_PASSWORD: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_CERT_SHA256: ${{ secrets.SIGNING_CERT_SHA256 }}
        run: |
          set -euo pipefail
          required=(SIGNING_KEY_BASE64 SIGNING_KEY_STORE_PASSWORD SIGNING_KEY_ALIAS SIGNING_KEY_PASSWORD SIGNING_CERT_SHA256)
          for name in "${required[@]}"; do
            test -n "${!name-}" || { echo "Missing required Actions secret: $name" >&2; exit 1; }
          done
          umask 077
          keystore="$RUNNER_TEMP/autojs6-release-signing.jks"
          printf '%s' "$SIGNING_KEY_BASE64" | tr -d '\r\n' | base64 --decode > "$keystore"
          test -s "$keystore"
          keytool -list -keystore "$keystore" -storepass:env SIGNING_KEY_STORE_PASSWORD -alias "$SIGNING_KEY_ALIAS" >/dev/null
          echo "SIGNING_KEY_STORE_FILE=$keystore" >> "$GITHUB_ENV"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed plugin APK
        env:
          SIGNING_KEY_STORE_PASSWORD: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease -Pautojs.apkBuilder.templatePlugin.runtimeKitDir=runtime-kit --no-daemon

      - name: Verify release APK signature
        id: apk
        env:
          SIGNING_CERT_SHA256: ${{ secrets.SIGNING_CERT_SHA256 }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          apks=(app/build/outputs/apk/release/*.apk)
          test "${#apks[@]}" -eq 1 || exit 1
          apk="${apks[0]}"
          apksigner="$(command -v apksigner || true)"
          if [ -z "$apksigner" ]; then
            apksigner="$(find "${ANDROID_HOME:?}/build-tools" -mindepth 2 -maxdepth 2 -type f -name apksigner -print | sort -V | tail -n 1)"
          fi
          test -x "$apksigner"
          expected_sha256="$(printf '%s' "$SIGNING_CERT_SHA256" | tr '[:upper:]' '[:lower:]' | tr -d ':[:space:]')"
          verification="$($apksigner verify --verbose --print-certs "$apk")"
          printf '%s\n' "$verification"
          actual_sha256="$(
            printf '%s\n' "$verification" \
              | grep -E 'certificate SHA-256 digest:' \
              | head -n 1 \
              | sed 's/.*digest: //' \
              | tr '[:upper:]' '[:lower:]' \
              | tr -d ':[:space:]'
          )"
          echo "Expected signer certificate SHA-256: $expected_sha256"
          echo "Actual signer certificate SHA-256:   $actual_sha256"
          test "$actual_sha256" = "$expected_sha256"
          echo "path=$apk" >> "$GITHUB_OUTPUT"

      - name: Verify plugin APK assets
        run: python3 scripts/check_apk_assets.py --plugin-apk "${{ steps.apk.outputs.path }}"

      - name: Remove release signing material
        if: always()
        run: rm -f "$RUNNER_TEMP/autojs6-release-signing.jks"

      - name: Publish plugin release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.vars.outputs.tag }}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "APK Builder Plugin $tag" --notes "Built from AutoJs6 Runtime Kit $tag"
          gh release upload "$tag" "${{ steps.apk.outputs.path }}" --clobber

      - name: Persist released plugin version
        env:
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          git fetch --no-tags origin \
            "+refs/heads/$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH"
          git reset --hard "origin/$TARGET_BRANCH"
          python3 scripts/sync_version_from_runtime_kit.py runtime-kit

          version_build="$(sed -n 's/^VERSION_BUILD=//p' version.properties | head -n 1)"
          version_name="$(sed -n 's/^VERSION_NAME=//p' version.properties | head -n 1)"
          test -n "$version_build"
          test -n "$version_name"

          git add version.properties
          if git diff --cached --quiet; then
            echo "version.properties already matches release $RELEASE_TAG."
            exit 0
          fi

          git diff --cached --check
          git diff --cached -- version.properties
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync plugin version for $RELEASE_TAG"
          git push origin "HEAD:$TARGET_BRANCH"

          echo "Persisted VERSION_BUILD=$version_build"
          echo "Persisted VERSION_NAME=$version_name"
