name: Build APK Builder Plugin from Runtime Kit

on:
  repository_dispatch:
    types:
      - autojs6_runtime_kit_released
  workflow_dispatch:
    inputs:
      tag:
        description: AutoJs6 release tag, for example v6.8.0
        required: true
      source_repo:
        description: AutoJs6 source repository
        required: false
        default: SuperMonster003/AutoJs6

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Resolve build inputs
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "tag=${{ github.event.client_payload.tag }}" >> "$GITHUB_OUTPUT"
            echo "source_repo=${{ github.event.client_payload.source_repo }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "source_repo=${{ inputs.source_repo }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Runtime Kit
        env:
          GH_TOKEN: ${{ secrets.AUTOJS6_MAIN_REPO_TOKEN || github.token }}
        run: |
          rm -rf runtime-kit
          mkdir -p runtime-kit
          gh release download "${{ steps.vars.outputs.tag }}" \
            --repo "${{ steps.vars.outputs.source_repo }}" \
            --pattern "autojs6-runtime-kit-*.zip" \
            --dir runtime-kit
          unzip runtime-kit/autojs6-runtime-kit-*.zip -d runtime-kit

      - name: Verify Runtime Kit
        run: python3 scripts/verify_runtime_kit.py runtime-kit

      - name: Sync plugin version
        run: python3 scripts/sync_version_from_runtime_kit.py runtime-kit

      - name: Prepare release signing keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          SIGNING_KEY_STORE_PASSWORD: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          required=(
            SIGNING_KEY_BASE64
            SIGNING_KEY_STORE_PASSWORD
            SIGNING_KEY_ALIAS
            SIGNING_KEY_PASSWORD
          )
          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            printf 'Missing required Actions secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          umask 077
          keystore="$RUNNER_TEMP/autojs6-release-signing.jks"
          printf '%s' "$SIGNING_KEY_BASE64" | tr -d '\r\n' | base64 --decode > "$keystore"
          test -s "$keystore"

          keytool -list \
            -keystore "$keystore" \
            -storepass:env SIGNING_KEY_STORE_PASSWORD \
            -alias "$SIGNING_KEY_ALIAS" \
            >/dev/null

          echo "SIGNING_KEY_STORE_FILE=$keystore" >> "$GITHUB_ENV"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed plugin APK
        env:
          SIGNING_KEY_STORE_PASSWORD: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -Pautojs.apkBuilder.templatePlugin.runtimeKitDir=runtime-kit \
            --no-daemon

      - name: Verify release APK signature
        id: apk
        env:
          SIGNING_KEY_STORE_PASSWORD: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          apks=(app/build/outputs/apk/release/*.apk)
          if [ "${#apks[@]}" -ne 1 ]; then
            printf 'Expected exactly one release APK, found %d.\n' "${#apks[@]}" >&2
            printf '  %s\n' "${apks[@]-}" >&2
            exit 1
          fi
          apk="${apks[0]}"

          apksigner="$(command -v apksigner || true)"
          if [ -z "$apksigner" ]; then
            apksigner="$(find "${ANDROID_HOME:?}/build-tools" -mindepth 2 -maxdepth 2 -type f -name apksigner -print | sort -V | tail -n 1)"
          fi
          if [ ! -x "$apksigner" ]; then
            echo 'Unable to locate Android apksigner.' >&2
            exit 1
          fi

          certificate="$RUNNER_TEMP/autojs6-release-signing.cer"
          keytool -exportcert \
            -keystore "$SIGNING_KEY_STORE_FILE" \
            -storepass:env SIGNING_KEY_STORE_PASSWORD \
            -alias "$SIGNING_KEY_ALIAS" \
            -file "$certificate" \
            >/dev/null
          expected_sha256="$(sha256sum "$certificate" | awk '{print tolower($1)}')"

          verification="$($apksigner verify --verbose --print-certs "$apk")"
          printf '%s\n' "$verification"
          actual_sha256="$(
            printf '%s\n' "$verification" \
              | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' \
              | head -n 1 \
              | tr '[:upper:]' '[:lower:]' \
              | tr -d '[:space:]'
          )"

          if [ -z "$actual_sha256" ] || [ "$actual_sha256" != "$expected_sha256" ]; then
            echo 'The APK signer certificate does not match the configured release keystore.' >&2
            exit 1
          fi

          echo "path=$apk" >> "$GITHUB_OUTPUT"

      - name: Verify plugin APK assets
        run: python3 scripts/check_apk_assets.py --plugin-apk "${{ steps.apk.outputs.path }}"

      - name: Remove release signing material
        if: always()
        run: |
          rm -f \
            "$RUNNER_TEMP/autojs6-release-signing.jks" \
            "$RUNNER_TEMP/autojs6-release-signing.cer"

      - name: Publish plugin release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.vars.outputs.tag }}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "APK Builder Plugin $tag" --notes "Built from AutoJs6 Runtime Kit $tag"
          gh release upload "$tag" "${{ steps.apk.outputs.path }}" --clobber
